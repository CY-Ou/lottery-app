<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>樂透助手</title>

<style>
body{
  font-family:-apple-system;
  text-align:center;
  padding:20px;
  background:#f2f2f7;
}

h2{margin-top:20px;}

.numbers{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  margin:15px 0;
}

.ball{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#007AFF;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
}

.power{background:#ff9500;}

button{
  padding:14px 28px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#007AFF;
  color:white;
  margin-top:15px;
}

select{
  padding:10px;
  font-size:16px;
  border-radius:10px;
  margin-top:10px;
}

.info{
  margin-top:15px;
  font-size:14px;
  color:#333;
  background:white;
  padding:12px;
  border-radius:10px;
  line-height:1.5;
}

.roi{
  margin-top:10px;
  font-size:14px;
  color:#555;
}
</style>

</head>

<body>

<h2>🎯 大樂透</h2>
<div id="lotto" class="numbers"></div>

<h2>⚡ 威力彩</h2>
<div id="power" class="numbers"></div>

<select id="mode" onchange="updateInfo()">
<option value="normal">穩定版</option>
<option value="high">衝獎版</option>
<option value="cold">低分獎版</option>
</select>

<button onclick="generate()">重新產生</button>

<div id="info" class="info"></div>
<div id="roi" class="roi"></div>

<script>

function uniqueNumbers(count, min, max){
  let set = new Set();
  while(set.size < count){
    set.add(Math.floor(Math.random()*(max-min+1))+min);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

function render(id, nums, extra=null){
  let html = nums.map(n=>`<div class="ball">${n}</div>`).join("");
  if(extra!==null){
    html += `<div class="ball power">${extra}</div>`;
  }
  document.getElementById(id).innerHTML = html;
}

function generate(){

  let mode = document.getElementById("mode").value;
  let lotto;

  if(mode==="normal"){
    lotto = [
      ...uniqueNumbers(2,1,19),
      ...uniqueNumbers(2,20,39),
      ...uniqueNumbers(2,40,49)
    ].sort((a,b)=>a-b);
  }
  else if(mode==="high"){
    lotto = uniqueNumbers(6,30,49);
  }
  else{
    lotto = uniqueNumbers(6,32,49);
  }

  let power = uniqueNumbers(6,1,38);
  let power2 = [6,7,8][Math.floor(Math.random()*3)];

  render("lotto", lotto);
  render("power", power, power2);
}

function updateInfo(){

  let mode = document.getElementById("mode").value;

  let infoText = "";
  let roiText = "";

  if(mode==="normal"){
    infoText = "穩定版：分布平均（低/中/高各2），降低選號錯誤風險，適合長期使用。";
    roiText = "ROI約0.6~0.7：代表每投入100，平均回收60~70，屬於穩定策略。";
  }
  else if(mode==="high"){
    infoText = "衝獎版：偏高號集中，提高中頭獎時的獨占機率，但命中率較低。";
    roiText = "ROI約0.4~0.6：波動大，通常較低，但中獎時報酬高。";
  }
  else{
    infoText = "低分獎版：避開生日號（1~31），降低與他人重號機率。";
    roiText = "ROI約0.6~0.75：命中率略低，但中獎時較不易分獎。";
  }

  document.getElementById("info").innerText = infoText;
  document.getElementById("roi").innerText = roiText;
}

window.onload = function(){
  generate();
  updateInfo();
};

</script>

</body>
</html>
