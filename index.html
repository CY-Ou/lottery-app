<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>樂透策略助手</title>

<style>
body{
  font-family:-apple-system;
  text-align:center;
  padding:20px;
  background:#f2f2f7;
}

h2{margin-top:20px;}

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  margin:12px 0;
}

.best{
  border:3px solid #34C759;
}

.alt{
  opacity:0.9;
}

.numbers{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin:8px 0;
}

.ball{
  width:48px;
  height:48px;
  border-radius:50%;
  background:#007AFF;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:bold;
}

.power{background:#ff9500;}

button{
  padding:14px 28px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#007AFF;
  color:white;
  margin-top:15px;
}

select{
  padding:10px;
  font-size:16px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>🎯 今日推薦號碼</h2>

<select id="mode">
<option value="normal">穩定版</option>
<option value="high">衝獎版</option>
<option value="cold">低分獎版</option>
</select>

<button onclick="generate()">重新產生</button>

<div id="main"></div>
<div id="alt"></div>

<script>

// 不重複亂數
function uniqueNumbers(count, min, max){
  let set = new Set();
  while(set.size < count){
    set.add(Math.floor(Math.random()*(max-min+1))+min);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

// 評分
function evaluate(nums){

  let score = 0;

  let low = nums.filter(n=>n<=19).length;
  let mid = nums.filter(n=>n>=20 && n<=39).length;
  let high = nums.filter(n=>n>=40).length;

  if(low>=1 && mid>=1 && high>=1) score+=2;

  let range = Math.max(...nums)-Math.min(...nums);
  if(range>20) score+=1;

  let above31 = nums.filter(n=>n>31).length;
  if(above31>=4) score+=2;

  return score;
}

// 渲染球（通用）
function renderBalls(nums, colorClass=""){
  return nums.map(n=>`<div class="ball ${colorClass}">${n}</div>`).join("");
}

// 產生單組
function createSet(mode){

  let lotto;

  if(mode==="normal"){
    lotto=[
      ...uniqueNumbers(2,1,19),
      ...uniqueNumbers(2,20,39),
      ...uniqueNumbers(2,40,49)
    ].sort((a,b)=>a-b);
  }
  else if(mode==="high"){
    lotto=uniqueNumbers(6,30,49);
  }
  else{
    lotto=uniqueNumbers(6,32,49);
  }

  let power1 = uniqueNumbers(6,1,38); // 第一區
  let power2 = [6,7,8][Math.floor(Math.random()*3)]; // 第二區

  let score=evaluate(lotto);

  return {lotto, power1, power2, score};
}

// 主流程
function generate(){

  let mode=document.getElementById("mode").value;

  let sets=[];

  for(let i=0;i<6;i++){
    sets.push(createSet(mode));
  }

  sets.sort((a,b)=>b.score-a.score);

  let best=sets[0];
  let alt=sets.slice(1,3);

  // ⭐ 主推薦
  document.getElementById("main").innerHTML=`
    <div class="card best">
      ⭐ 最佳推薦（評分:${best.score}）
      
      <div>🎯 大樂透</div>
      <div class="numbers">
        ${renderBalls(best.lotto)}
      </div>

      <div>⚡ 威力彩</div>
      <div class="numbers">
        ${renderBalls(best.power1)}
        ${renderBalls([best.power2], "power")}
      </div>
    </div>
  `;

  // 🟡 備選
  let altHTML="";

  alt.forEach(a=>{
    altHTML+=`
      <div class="card alt">
        備選（評分:${a.score}）

        <div>🎯 大樂透</div>
        <div class="numbers">
          ${renderBalls(a.lotto)}
        </div>

        <div>⚡ 威力彩</div>
        <div class="numbers">
          ${renderBalls(a.power1)}
          ${renderBalls([a.power2], "power")}
        </div>
      </div>
    `;
  });

  document.getElementById("alt").innerHTML=altHTML;
}

window.onload=generate;

</script>

</body>
</html>
