<!DOCTYPE html><html><head><meta name=viewport content="width=device-width, initial-scale=1">
<title>樂透App</title>
<style>
body{font-family:-apple-system;text-align:center;padding:20px;background:#f5f5f5}
h2{margin-top:30px}
button{padding:12px 20px;font-size:18px;margin:10px;border-radius:10px;border:none;background:#007AFF;color:#fff}
select{padding:10px;font-size:16px}
.result{font-size:24px;margin-top:15px;font-weight:bold}
</style></head><body>

<h2>🎯 大樂透</h2>
<div id="lotto" class="result"></div>

<h2>⚡ 威力彩</h2>
<div id="power" class="result"></div>

<select id="mode">
<option value="normal">穩定版</option>
<option value="high">衝獎版</option>
<option value="cold">低分獎版</option>
</select><br>

<button onclick="generate()">重新產生</button>

<script>
function u(c,min,max){
let s=new Set();
while(s.size<c){s.add(Math.floor(Math.random()*(max-min+1))+min);}
return [...s].sort((a,b)=>a-b);
}
function generate(){
let m=document.getElementById("mode").value;
let lotto;
if(m==="normal"){lotto=[...u(2,1,19),...u(2,20,39),...u(2,40,49)].sort((a,b)=>a-b);}
else if(m==="high"){lotto=u(6,30,49);}
else{lotto=u(6,32,49);}
let power=u(6,1,38);
let p2=[6,7,8][Math.floor(Math.random()*3)];
document.getElementById("lotto").innerText=lotto.join(" ");
document.getElementById("power").innerText=power.join(" ")+" + "+p2;
}
generate();
</script>

</body></html>
