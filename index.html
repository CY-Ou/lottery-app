<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>樂透助手</title>

<style>
body{
  font-family:-apple-system;
  text-align:center;
  padding:20px;
  background:#f2f2f7;
}

h2{
  margin-top:25px;
}

.numbers{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;
  margin:15px 0;
}

.ball{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#007AFF;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

.power{
  background:#ff9500;
}

button{
  padding:14px 28px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#007AFF;
  color:white;
  margin-top:20px;
}

select{
  padding:10px;
  font-size:16px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>🎯 大樂透</h2>
<div id="lotto" class="numbers"></div>

<h2>⚡ 威力彩</h2>
<div id="power" class="numbers"></div>

<select id="mode">
<option value="normal">穩定版</option>
<option value="high">衝獎版</option>
<option value="cold">低分獎版</option>
</select>

<br>

<button onclick="generate()">重新產生</button>

<script>

function uniqueNumbers(count, min, max){
  let set = new Set();
  while(set.size < count){
    set.add(Math.floor(Math.random()*(max-min+1))+min);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

function render(id, nums, extra=null){
  let html = nums.map(n=>`<div class="ball">${n}</div>`).join("");

  if(extra!==null){
    html += `<div class="ball power">${extra}</div>`;
  }

  document.getElementById(id).innerHTML = html;
}

function generate(){

  let mode = document.getElementById("mode").value;
  let lotto;

  if(mode==="normal"){
    lotto = [
      ...uniqueNumbers(2,1,19),
      ...uniqueNumbers(2,20,39),
      ...uniqueNumbers(2,40,49)
    ].sort((a,b)=>a-b);
  }
  else if(mode==="high"){
    lotto = uniqueNumbers(6,30,49);
  }
  else{
    lotto = uniqueNumbers(6,32,49);
  }

  let power = uniqueNumbers(6,1,38);
  let power2 = [6,7,8][Math.floor(Math.random()*3)];

  render("lotto", lotto);
  render("power", power, power2);
}

window.onload = generate;

</script>

</body>
</html>
