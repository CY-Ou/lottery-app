<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>樂透策略助手</title>

<style>
body{
  font-family:-apple-system;
  text-align:center;
  padding:20px;
  background:#f2f2f7;
}

h2{margin-top:20px;}

.group{
  background:white;
  padding:15px;
  border-radius:12px;
  margin:12px 0;
}

.best{
  border:3px solid #34C759;
}

.numbers{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin:10px 0;
}

.ball{
  width:46px;
  height:46px;
  border-radius:50%;
  background:#007AFF;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:bold;
}

.power{background:#ff9500;}

.roi{
  font-size:14px;
  margin-top:5px;
  color:#555;
}

.explain{
  margin-top:6px;
  font-size:13px;
  color:#666;
}

.info{
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:12px;
  font-size:13px;
  text-align:left;
  line-height:1.6;
}

button{
  padding:14px 28px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#007AFF;
  color:white;
  margin-top:15px;
}

select{
  padding:10px;
  font-size:16px;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>🎯 自動選最佳號碼</h2>

<select id="mode">
<option value="normal">穩定版</option>
<option value="high">衝獎版</option>
<option value="cold">低分獎版</option>
</select>

<button onclick="generateAll()">重新產生</button>

<div id="result"></div>

<div class="info">
<b>📊 評分說明</b><br>
🔥 4~5分：高潛力（分布佳＋避開熱門區）<br>
👍 2~3分：穩定（基本合理配置）<br>
⚠️ 0~1分：保守（可能集中或熱門）<br><br>

<b>📈 ROI概念</b><br>
ROI越高＝長期回收率越好<br>
0.7+：較佳策略<br>
0.6~0.7：穩定策略<br>
0.5~0.6：一般/偏保守<br><br>

※ 注意：樂透為隨機事件，評分代表「選號品質」，非中獎機率

</div>

<script>

function uniqueNumbers(count, min, max){
  let set = new Set();
  while(set.size < count){
    set.add(Math.floor(Math.random()*(max-min+1))+min);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

function evaluateROI(nums){

  let score = 0;

  let low = nums.filter(n=>n<=19).length;
  let mid = nums.filter(n=>n>=20 && n<=39).length;
  let high = nums.filter(n=>n>=40).length;

  if(low>=1 && mid>=1 && high>=1) score += 2;

  let range = Math.max(...nums) - Math.min(...nums);
  if(range > 20) score += 1;

  let above31 = nums.filter(n=>n>31).length;
  if(above31 >= 4) score += 2;

  let label, desc, roi;

  if(score >=4){
    label="🔥 高潛力";
    desc="分布佳且避開熱門區";
    roi="0.7+";
  }
  else if(score >=2){
    label="👍 穩定";
    desc="分布正常";
    roi="0.6~0.7";
  }
  else{
    label="⚠️ 保守";
    desc="可能集中或熱門";
    roi="0.5~0.6";
  }

  return {score,label,desc,roi};
}

function renderBalls(nums, extra){
  let html = nums.map(n=>`<div class="ball">${n}</div>`).join("");
  html += `<div class="ball power">${extra}</div>`;
  return `<div class="numbers">${html}</div>`;
}

function generateOne(mode){

  let lotto;

  if(mode==="normal"){
    lotto = [
      ...uniqueNumbers(2,1,19),
      ...uniqueNumbers(2,20,39),
      ...uniqueNumbers(2,40,49)
    ].sort((a,b)=>a-b);
  }
  else if(mode==="high"){
    lotto = uniqueNumbers(6,30,49);
  }
  else{
    lotto = uniqueNumbers(6,32,49);
  }

  let power = uniqueNumbers(6,1,38);
  let p2 = [6,7,8][Math.floor(Math.random()*3)];

  let result = evaluateROI(lotto);

  return {lotto, power, p2, result};
}

function generateAll(){

  let mode = document.getElementById("mode").value;

  let groups = [];

  for(let i=0;i<5;i++){
    groups.push(generateOne(mode));
  }

  groups.sort((a,b)=>b.result.score-a.result.score);

  let html = "";

  groups.forEach((g,index)=>{

    html += `
      <div class="group ${index===0?"best":""}">
        ${index===0?"⭐ 最佳組合":""}
        <div>🎯 大樂透</div>
        ${renderBalls(g.lotto,"")}
        <div>⚡ 威力彩</div>
        ${renderBalls(g.power,g.p2)}
        <div class="roi">
          評分：${g.result.score}（${g.result.label}）｜ROI：${g.result.roi}
        </div>
        <div class="explain">${g.result.desc}</div>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

window.onload = generateAll;

</script>

</body>
</html>
